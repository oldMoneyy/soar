<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniCPM-SALA FlashInfer Profiling — 64 Concurrency</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap');
:root{--bg:#F3F1EC;--bg2:#FFFFFF;--bg3:#FAF9F6;--txt:#141413;--txt2:#5E5D5A;--txt3:#8A8884;--txtf:#B0AEA9;--bdr:rgba(20,20,19,.12);--bdr2:rgba(20,20,19,.06);--amber:#D97706;--amberbg:rgba(217,119,6,.06);--amberbr:rgba(217,119,6,.2);--moss:#4D7C0F;--mossbg:rgba(77,124,15,.06);--mossbr:rgba(77,124,15,.2);--blue:#3B82F6;--bluebg:rgba(59,130,246,.06);--bluebr:rgba(59,130,246,.18);--terra:#9F1239;--terrabg:rgba(159,18,57,.05);--terrabr:rgba(159,18,57,.18);--pink:#DB2777;--pinkbg:rgba(219,39,119,.05);--pinkbr:rgba(219,39,119,.18);--violet:#6D28D9;--violetbg:rgba(109,40,217,.04);--violetbr:rgba(109,40,217,.18);--teal:#0E7490;--tealbg:rgba(14,116,144,.05);--tealbr:rgba(14,116,144,.18);--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(20,20,19,.2);border-radius:4px}
.pg{max-width:1400px;margin:0 auto;padding:56px 40px 100px}

/* Header */
.hdr{text-align:center;padding:48px 0 40px;border-bottom:1px solid var(--bdr);margin-bottom:48px}
.hdr h1{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--txt);letter-spacing:-.03em;margin-bottom:6px}
.hdr .sub{font-family:var(--sans);font-size:14px;color:var(--txt2);line-height:1.6;max-width:780px;margin:0 auto}
.hdr .specs{font-family:var(--mono);font-size:12px;color:var(--txt3);margin-top:16px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}

/* Section cards */
.SEC{border:1px solid var(--bdr);border-radius:12px;padding:28px 32px;margin:0 0 32px;background:var(--bg2);box-shadow:0 1px 3px rgba(0,0,0,.03)}
.SEC h2{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr2);color:var(--txt)}
.SEC h3{font-family:var(--serif);font-size:15px;font-weight:600;margin:14px 0 8px;color:var(--txt)}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:18px 22px}
.full{grid-column:1/-1}

/* Key-value rows */
.m{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:13px;font-family:var(--mono)}
.m:last-child{border-bottom:none}
.ml{color:var(--txt3)}.mv{color:var(--txt);font-weight:600}
.hi{color:var(--terra);font-weight:600}
.gd{color:var(--moss);font-weight:600}
.wn{color:var(--amber);font-weight:600}

/* Bar rows */
.br{display:flex;align-items:center;margin:3px 0;font-size:12px}
.bl{width:210px;color:var(--txt3);text-align:right;padding-right:10px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:11.5px}
.bw{flex:1;height:20px;background:var(--bg);border-radius:5px;position:relative;overflow:hidden;border:1px solid var(--bdr2)}
.b{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-family:var(--mono);font-weight:600;color:#fff;min-width:1px}
.bv{position:absolute;right:6px;top:0;height:100%;display:flex;align-items:center;font-size:11px;color:var(--txt3);font-family:var(--mono)}

/* Legend */
.leg{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0;font-size:12px;justify-content:center}
.li{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--txt2)}
.ld{width:10px;height:10px;border-radius:3px}

/* Tables */
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;margin:8px 0}
th{text-align:left;color:var(--txt);padding:8px 12px;border-bottom:2px solid var(--bdr);font-weight:600;background:var(--bg3);white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:6px 12px;border-bottom:1px solid var(--bdr2);color:var(--txt2)}
tr:hover td{background:var(--bg3)}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:var(--mono)}
.tm{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbr)}
.tl{background:var(--mossbg);color:var(--moss);border:1px solid var(--mossbr)}

/* Note */
.tbl-wrap{overflow-x:auto;margin:12px 0}
.note{font-family:var(--mono);font-size:12px;color:var(--terra);padding:12px 18px;border:1px dashed var(--terrabr);border-radius:8px;background:var(--terrabg);margin:14px 0;line-height:1.7}
</style>
</head>
<body>
<div class="pg">

<div class="hdr">
  <h1>FlashInfer Profiling</h1>
  <div class="sub">MiniCPM-SALA layer-level profiling at 64 concurrency — W4A16 GPTQ Marlin with FP8 KV Cache, CUDA graph disabled</div>
  <div class="specs">
    <span>3.88M input tokens</span>
    <span>410K output tokens</span>
    <span>64 requests</span>
    <span>1,815.86s benchmark</span>
    <span>125 prefill steps</span>
    <span>30,055 decode steps</span>
  </div>
</div>

<div id="D"></div>
</div>

<script>
function parseCSV(t){const L=t.trim().split('\n'),D=[];for(let i=1;i<L.length;i++){const p=L[i].split(',');if(p.length<6)continue;const k=p[0],s=k.split('/');let lt=s[1];if(lt==='lightning-attn')lt='lightning';D.push({key:k,layer:s[0],layerType:lt,component:s.slice(2).join('/'),layerNum:parseInt(s[0].slice(1)),total_ms:+p[1],count:+p[2],avg_ms:+p[3],min_ms:+p[4],max_ms:+p[5]})}return D}
function fmt(v){return v>=1000?(v/1000).toFixed(1)+'s':v>=1?v.toFixed(1)+'ms':(v*1000).toFixed(0)+'µs'}
function pct(v,t){return t>0?(v/t*100).toFixed(1)+'%':'0%'}
const NESTED=['attn_kernel','chunk_simple_gla','fused_recurrent','fla_kernel','fla_state_load','fla_state_save','sigmoid_gate','rope','qk_norm','o_norm'];
function isNested(c){return NESTED.some(n=>c.includes(n+'/'))}

function render(data){
const PS=125,DS=30055;
const prefill=data.filter(d=>d.component.endsWith('/prefill')&&!d.key.startsWith('model/'));
const decode=data.filter(d=>d.component.endsWith('/decode')&&!d.key.startsWith('model/'));
const other=data.filter(d=>d.key.startsWith('model/'));
const tP=prefill.filter(d=>!isNested(d.component)).reduce((s,d)=>s+d.total_ms,0);
const tD=decode.filter(d=>!isNested(d.component)).reduce((s,d)=>s+d.total_ms,0);
const tO=other.reduce((s,d)=>s+d.total_ms,0);
const G=tP+tD+tO;
let h='';

// Overview
h+='<div class="grid"><div class="card"><h3>Time Split</h3>';
[['Prefill',tP,'var(--amber)'],['Decode',tD,'var(--violet)'],['Other',tO,'var(--txtf)']].forEach(([l,ms,c])=>{
h+=`<div class="br"><span class="bl">${l}</span><div class="bw"><div class="b" style="width:${ms/G*100}%;background:${c}">${pct(ms,G)}</div><span class="bv">${fmt(ms)}</span></div></div>`});
h+='</div>';

const mc4AP=data.filter(d=>d.layerType==='minicpm4'&&d.component==='attn_kernel/prefill').reduce((s,d)=>s+d.total_ms,0);
const mc4AD=data.filter(d=>d.layerType==='minicpm4'&&d.component==='attn_kernel/decode').reduce((s,d)=>s+d.total_ms,0);
h+='<div class="card"><h3>Key Numbers</h3>';
h+=`<div class="m"><span class="ml">Total layer time</span><span class="mv">${fmt(G)}</span></div>`;
h+=`<div class="m"><span class="ml">Prefill per step</span><span class="mv">${fmt(tP/PS)}</span></div>`;
h+=`<div class="m"><span class="ml">Decode per step</span><span class="mv">${fmt(tD/DS)}</span></div>`;
h+=`<div class="m"><span class="ml">MiniCPM4 attn_kernel total</span><span class="mv hi">${fmt(mc4AP+mc4AD)}</span></div>`;
h+=`<div class="m"><span class="ml">Lightning decode total</span><span class="mv wn">${fmt(decode.filter(d=>d.layerType==='lightning').reduce((s,d)=>s+d.total_ms,0))}</span></div>`;
h+='</div></div>';

// Per-layer bars
h+='<div class="SEC"><h2>Per-Layer Time</h2>';
const LT={};
data.filter(d=>!d.key.startsWith('model/')&&!isNested(d.component)).forEach(d=>{
if(!LT[d.layer])LT[d.layer]={type:d.layerType,p:0,d:0};
if(d.component.endsWith('/prefill'))LT[d.layer].p+=d.total_ms;else if(d.component.endsWith('/decode'))LT[d.layer].d+=d.total_ms;
});
const maxLT=Math.max(...Object.values(LT).map(v=>v.p+v.d));
Object.keys(LT).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1))).forEach(l=>{
const v=LT[l],t=v.p+v.d,c=v.type==='minicpm4'?'var(--amber)':'var(--moss)',pp=v.p/maxLT*100,pd=v.d/maxLT*100;
h+=`<div class="br"><span class="bl">${l} <span class="tag ${v.type==='minicpm4'?'tm':'tl'}">${v.type}</span></span>
<div class="bw"><div class="b" style="width:${(pp+pd)}%;background:${c};opacity:0.7"><div style="width:${pp/(pp+pd)*100}%;height:100%;background:${c};border-radius:4px 0 0 4px"></div></div>
<span class="bv">${fmt(t)}</span></div></div>`});
h+='<div class="leg"><div class="li"><div class="ld" style="background:var(--amber)"></div>minicpm4</div><div class="li"><div class="ld" style="background:var(--moss)"></div>lightning</div><div class="li"><div class="ld" style="background:var(--txt3);opacity:0.35"></div>decode portion</div></div></div>';

// Decode breakdown
h+='<div class="SEC"><h2>Decode Per-Step Breakdown</h2><div class="grid">';
// MiniCPM4
h+='<div class="card"><h3>MiniCPM4 (8 layers) per decode step</h3>';
const mc4D={};decode.filter(d=>d.layerType==='minicpm4').forEach(d=>{const c=d.component.replace('/decode','');mc4D[c]=(mc4D[c]||0)+d.total_ms/DS});
const mc4DT=Object.values(mc4D).reduce((s,v)=>s+v,0);
const mc4C={attn:'var(--amber)',attn_kernel:'var(--amber)',mlp:'var(--moss)',qkv_proj:'var(--blue)',o_gate:'var(--violet)',o_proj:'var(--teal)',post_attn_norm:'var(--amber)',input_norm:'var(--txt3)'};
Object.entries(mc4D).sort((a,b)=>b[1]-a[1]).forEach(([c,ms])=>{
h+=`<div class="br"><span class="bl">${c}</span><div class="bw"><div class="b" style="width:${ms/mc4DT*100}%;background:${mc4C[c]||'var(--txt3)'}">${pct(ms,mc4DT)}</div><span class="bv">${(ms*1000).toFixed(0)}µs</span></div></div>`});
h+=`<div class="m" style="margin-top:10px"><span class="ml">Total/step</span><span class="mv hi">${fmt(mc4DT)}</span></div></div>`;

// Lightning
h+='<div class="card"><h3>Lightning (24 layers) per decode step</h3>';
const lnD={};decode.filter(d=>d.layerType==='lightning').forEach(d=>{const c=d.component.replace('/decode','');lnD[c]=(lnD[c]||0)+d.total_ms/DS});
const lnDT=Object.values(lnD).reduce((s,v)=>s+v,0);
const lnC={attn:'var(--moss)',fla_kernel:'var(--teal)',fused_recurrent_gla:'var(--blue)',mlp:'var(--moss)',sigmoid_gate:'var(--violet)',fla_state_load:'var(--violet)',fla_state_save:'var(--pink)',rope:'var(--amber)',qkv_proj:'var(--blue)',qk_norm:'var(--teal)',o_proj:'var(--moss)',o_norm:'var(--txt3)',post_attn_norm:'var(--amber)',input_norm:'var(--txt3)'};
Object.entries(lnD).sort((a,b)=>b[1]-a[1]).forEach(([c,ms])=>{
h+=`<div class="br"><span class="bl">${c}</span><div class="bw"><div class="b" style="width:${ms/lnDT*100}%;background:${lnC[c]||'var(--txt3)'}">${pct(ms,lnDT)}</div><span class="bv">${(ms*1000).toFixed(0)}µs</span></div></div>`});
h+=`<div class="m" style="margin-top:10px"><span class="ml">Total/step</span><span class="mv">${fmt(lnDT)}</span></div></div></div>`;

// Decode attribution
const oD=other.filter(d=>d.key.includes('/decode')).reduce((s,d)=>s+d.total_ms,0)/DS;
const allDT=mc4DT+lnDT+oD;
h+='<div class="card full" style="margin-top:4px"><h3>Decode Time Attribution</h3>';
[['Lightning attention (24 layers)',lnDT,'var(--moss)'],['MiniCPM4 dense attention (8 layers)',mc4DT,'var(--amber)'],['Other (logits/embed)',oD,'var(--txtf)']].forEach(([l,ms,c])=>{
h+=`<div class="br"><span class="bl">${l}</span><div class="bw"><div class="b" style="width:${ms/allDT*100}%;background:${c}">${pct(ms,allDT)}</div><span class="bv">${fmt(ms)}/step</span></div></div>`});
h+=`<div class="m" style="margin-top:10px"><span class="ml">Total per decode step</span><span class="mv">${fmt(allDT)}</span></div></div></div>`;

// Prefill top components
h+='<div class="SEC"><h2>Prefill Per-Step Breakdown (Top 15)</h2>';
const pC={};prefill.forEach(d=>{const l=d.layerType+'/'+d.component.replace('/prefill','');if(!pC[l])pC[l]={ms:0,t:d.layerType};pC[l].ms+=d.total_ms/PS});
Object.entries(pC).sort((a,b)=>b[1].ms-a[1].ms).slice(0,15).forEach(([l,{ms,t}])=>{
const c=t==='minicpm4'?'var(--amber)':'var(--moss)',pT=Object.values(pC).reduce((s,v)=>s+v.ms,0);
h+=`<div class="br"><span class="bl">${l}</span><div class="bw"><div class="b" style="width:${ms/pT*100}%;background:${c}">${pct(ms,pT)}</div><span class="bv">${fmt(ms)}</span></div></div>`});
h+='</div>';

// MiniCPM4 attn kernel table
h+='<div class="SEC"><h2>MiniCPM4 attn_kernel Per Layer — Optimization Target</h2>';
h+='<div class="tbl-wrap"><table><tr><th>Layer</th><th class="r">Prefill Total</th><th class="r">Prefill Avg</th><th class="r">Prefill Max</th><th class="r">Decode Total</th><th class="r">Decode Avg</th><th class="r">Combined</th></tr>';
let mc4T=0;
[0,9,16,17,22,29,30,31].forEach(n=>{
const ln='L'+String(n).padStart(2,'0');
const p=data.find(d=>d.layer===ln&&d.component==='attn_kernel/prefill');
const d2=data.find(d=>d.layer===ln&&d.component==='attn_kernel/decode');
const pt=p?p.total_ms:0,pa=p?p.avg_ms:0,pm=p?p.max_ms:0;
const dt=d2?d2.total_ms:0,da=d2?d2.avg_ms:0;
const c=pt+dt;mc4T+=c;
h+=`<tr><td>${ln}</td><td class="r">${fmt(pt)}</td><td class="r">${fmt(pa)}</td><td class="r" style="color:var(--terra);font-weight:600">${fmt(pm)}</td><td class="r">${fmt(dt)}</td><td class="r">${(da*1000).toFixed(0)}µs</td><td class="r" style="font-weight:700">${fmt(c)}</td></tr>`});
h+=`<tr style="border-top:2px solid var(--bdr)"><td style="font-weight:700">TOTAL</td><td class="r" style="font-weight:700">${fmt(mc4AP)}</td><td></td><td></td><td class="r" style="font-weight:700">${fmt(mc4AD)}</td><td></td><td class="r" style="font-weight:700;color:var(--terra)">${fmt(mc4T)}</td></tr>`;
h+='</table></div><div class="note">Dense attention over full context. Sparse block selection would reduce prefill from ~145ms to ~10ms per layer per step.</div></div>';

// Lightning decode component table
h+='<div class="SEC"><h2>Lightning Attention Components — Decode</h2>';
h+='<div class="tbl-wrap"><table><tr><th>Component</th><th class="r">Total</th><th class="r">% of Lightning</th><th class="r">Per Step</th><th class="r">Per Layer/Step</th><th class="r">Calls</th></tr>';
const lnA={};decode.filter(d=>d.layerType==='lightning').forEach(d=>{const c=d.component.replace('/decode','');if(!lnA[c])lnA[c]={t:0,n:0};lnA[c].t+=d.total_ms;lnA[c].n+=d.count});
const lnAT=Object.values(lnA).reduce((s,v)=>s+v.t,0);
Object.entries(lnA).sort((a,b)=>b[1].t-a[1].t).forEach(([c,{t,n}])=>{
h+=`<tr><td>${c}</td><td class="r">${fmt(t)}</td><td class="r">${pct(t,lnAT)}</td><td class="r">${fmt(t/DS)}</td><td class="r">${((t/DS/24)*1000).toFixed(0)}µs</td><td class="r">${n.toLocaleString()}</td></tr>`});
h+=`<tr style="border-top:2px solid var(--bdr)"><td style="font-weight:700">TOTAL</td><td class="r" style="font-weight:700">${fmt(lnAT)}</td><td></td><td class="r" style="font-weight:700">${fmt(lnAT/DS)}</td><td></td><td></td></tr>`;
h+='</table></div></div>';

document.getElementById('D').innerHTML=h;
}

const CSV_DATA = `
